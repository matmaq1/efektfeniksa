function App() {
  const [active, setActive] = useState("home");

  useEffect(() => {
    const ids = ["home", "agenda", "prelegenci", "miejsce"];
    const onScroll = () => {
      const y = window.scrollY + 200;
      let cur = "home";
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const onNav = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: "smooth" });
  };

  return (
    <>
      <PLNav active={active} onNav={onNav}/>
      <main>
        <PLHero/>

        <section id="agenda" className="relative py-32 overflow-hidden"
          style={{ background: "linear-gradient(180deg, #0e0604 0%, #140905 50%, #0e0604 100%)" }}>
          <div className="absolute inset-x-0 top-0 h-40 pointer-events-none"
               style={{ background: "radial-gradient(50% 100% at 50% 0%, rgba(255,90,31,0.15) 0%, transparent 70%)" }}/>
          <Agenda days={window.AGENDA}/>
        </section>

        <SpeakersGallery entries={window.GALLERY}/>
        <PLSpeakersStrip speakers={window.ALL_SPEAKERS}/>
        <PLVenue/>
        <PLCTA/>
      </main>
      <PLFooter/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App/>);
</script>
